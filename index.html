<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>&#25104;&#32489;&#21333;_&#20013;&#22269;&#22823;&#23398;MOOC&#65288;&#24917;&#35838;&#65289;</title>
  <meta name="apple-mobile-web-app-title" content="&#25104;&#32489;&#21333;_&#20013;&#22269;&#22823;&#23398;MOOC&#65288;&#24917;&#35838;&#65289;">
  <meta name="application-name" content="&#25104;&#32489;&#21333;_&#20013;&#22269;&#22823;&#23398;MOOC&#65288;&#24917;&#35838;&#65289;">
  <meta property="og:title" content="&#25104;&#32489;&#21333;_&#20013;&#22269;&#22823;&#23398;MOOC&#65288;&#24917;&#35838;&#65289;">
  <meta name="twitter:title" content="&#25104;&#32489;&#21333;_&#20013;&#22269;&#22823;&#23398;MOOC&#65288;&#24917;&#35838;&#65289;">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      padding-bottom: calc(116px + env(safe-area-inset-bottom));
    }

    .content {
      min-height: 100vh;
      padding: 26px 0 24px;
      background: #000;
    }

    .transcript {
      display: block;
      width: calc(100% - 46px);
      max-width: 1191px;
      margin: 0 auto;
      background: #fff;
    }

    .save-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: 22px 24px calc(22px + env(safe-area-inset-bottom));
      background: #000;
      display: flex;
      justify-content: center;
    }

    .save {
      width: min(67vw, 520px);
      height: 72px;
      border: 0;
      border-radius: 999px;
      background: #ffdc9c;
      color: #30291d;
      cursor: pointer;
      font: 500 34px/1 -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .38);
      -webkit-tap-highlight-color: transparent;
      appearance: none;
    }

    .save:active {
      background: #f6ce82;
    }

    @media (max-width: 520px) {
      body {
        padding-bottom: calc(104px + env(safe-area-inset-bottom));
      }

      .content {
        padding-top: 18px;
      }

      .transcript {
        width: calc(100% - 24px);
      }

      .save-wrap {
        padding: 21px 24px calc(21px + env(safe-area-inset-bottom));
      }

      .save {
        width: min(72vw, 420px);
        height: 62px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="content">
    <img class="transcript" src="transcript.png" alt="&#25104;&#32489;&#21333;_&#20013;&#22269;&#22823;&#23398;MOOC&#65288;&#24917;&#35838;&#65289;">
  </main>

  <div class="save-wrap">
    <button class="save" id="saveButton" type="button">&#20445;&#23384;</button>
  </div>

  <script>
    const imageUrl = "transcript.png";
    const fileName = "\u6210\u7ee9\u5355_\u4e2d\u56fd\u5927\u5b66MOOC\uff08\u6155\u8bfe\uff09.png";

    async function saveImage() {
      try {
        const response = await fetch(imageUrl, { cache: "no-store" });
        const blob = await response.blob();
        const file = new File([blob], fileName, { type: blob.type || "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          await navigator.share({
            files: [file],
            title: "\u6210\u7ee9\u5355_\u4e2d\u56fd\u5927\u5b66MOOC\uff08\u6155\u8bfe\uff09"
          });
          return;
        }

        const objectUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = objectUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
      } catch (error) {
        window.location.href = imageUrl;
      }
    }

    document.getElementById("saveButton").addEventListener("click", saveImage);
  </script>
</body>
</html>
